body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #0a0a0a, #111);
  color: white;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #00f7ff;
}

/* Hero */
.hero {
  padding: 70px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 36px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.7;
}

/* Grid */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 25px;
  padding: 30px;
}

/* Cards */
.card {
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.4s;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  filter: brightness(0.6);
  transition: 0.4s;
}

.card:hover img {
  filter: brightness(0.9);
}

.card:hover {
  transform: translateY(-8px) scale(1.05);
}

.card-content {
  position: absolute;
  bottom: 15px;
  left: 15px;
}

.card h2 {
  margin: 0;
}

.card p {
  font-size: 14px;
  opacity: 0.8;
}

/* Glow effect */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border: 2px solid transparent;
  border-radius: 15px;
  transition: 0.4s;
}

.card:hover::before {
  border-color: #00f7ff;
  box-shadow: 0 0 20px #00f7ff;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.5;
}
